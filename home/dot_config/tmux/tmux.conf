bind ^X lock-server
bind ^C new-window -c "$HOME"
bind ^D detach
bind * list-clients

bind H previous-window
bind L next-window

bind r command-prompt "rename-window %%"
bind R source-file ~/.config/tmux/tmux.conf
bind ^W list-windows
bind w list-windows
bind -r T swap-window -d -t :-
bind -r t swap-window -d -t :+
bind z resize-pane -Z
bind ^L refresh-client
bind l refresh-client
bind | split-window -h -c "#{pane_current_path}"  # horizontal split, same dir
bind \\ split-window -v -c "#{pane_current_path}"  # vertical split, same dir
bind s split-window -h -c "#{pane_current_path}"  # alias for horizontal split
bind v split-window -v -c "#{pane_current_path}"  # alias for vertical split
bind '"' choose-window
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R
bind -r -T prefix , resize-pane -L 20
bind -r -T prefix . resize-pane -R 20
bind -r -T prefix - resize-pane -D 7
bind -r -T prefix = resize-pane -U 7
bind : command-prompt
bind * setw synchronize-panes
bind P set pane-border-status
bind c new-window -c "#{pane_current_path}"  # new window in current path (standard tmux convention)
bind X kill-pane                             # moved kill-pane off 'c' to avoid accidents
bind x swap-pane -D
bind S choose-session
bind K send-keys "clear"\; send-keys "Enter"
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi C-v send-keys -X rectangle-toggle  # block/rectangle selection in copy mode

set -g default-terminal "tmux-256color"            # use tmux terminfo for best compatibility
set -ga terminal-features '*:RGB:usstyle:hyperlinks:extkeys' # enable true color, underline styles, hyperlinks, and extended keys

set -g prefix ^A                 # use Ctrl-A as prefix key
set -g base-index 1              # start indexing windows at 1 instead of 0
set -g detach-on-destroy on      # detach from tmux when closing a session
set -g history-limit 1000000     # increase history size (from 2,000)
set -g renumber-windows on       # renumber all windows when any window is closed
set -g set-clipboard on          # use system clipboard
set -g status-position top       # macOS / darwin style
set -g mouse on                  # click to focus pane/window, scroll with wheel, drag to resize
set -g allow-passthrough all     # pass escape sequences (OSC 8 hyperlinks, images, etc.) directly to Ghostty
set -g pane-base-index 1         # start pane numbering at 1 to match window numbering
setw -g mode-keys vi 		     # use vi keys in copy mode
set -g pane-active-border-style 'fg=magenta,bg=default'
set -g pane-border-style 'fg=brightblack,bg=default'
set -g default-terminal "${TERM}"

set -g @fzf-url-fzf-options '-p 60%,30% --prompt="   " --border-label=" Open URL "'
set -g @fzf-url-history-limit '2000'

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'alexwforsythe/tmux-which-key'

set -g @plugin 'Morantron/tmux-fingers'
set -g @plugin 'sainnhe/tmux-fzf'
set -g @plugin 'wfxr/tmux-fzf-url'
set -g @plugin 'catppuccin/tmux'
set -g @plugin 'omerxx/tmux-sessionx'

set -g @fingers-key f

set -g @sessionx-bind-zo-new-window 'ctrl-y'
set -g @sessionx-auto-accept 'off'
set -g @sessionx-bind 'o'
set -g @sessionx-x-path '~/src/github.com/lucacome'
set -g @sessionx-window-height '85%'
set -g @sessionx-window-width '75%'
set -g @sessionx-zoxide-mode 'on'
set -g @sessionx-custom-paths-subdirectories 'false'
set -g @sessionx-filter-current 'false'

set -g @continuum-restore 'on'
set -g @resurrect-strategy-vim 'session'
set -g @resurrect-strategy-nvim 'session'
set -g @resurrect-capture-pane-contents 'on'

set -g @catppuccin_flavor "mocha"                          # latte, frappe, macchiato, mocha
set -g @catppuccin_window_status_style "rounded"           # basic, rounded, slanted, custom, or none
set -g @catppuccin_window_number_position "right"
set -g @catppuccin_window_text " #W #{?#{==:#{pane_current_command},ssh},#T,#{s|$HOME/src/github.com/lucacome/|git/|;s|$HOME|~|:pane_current_path}}"          # inactive: ssh shows host, else path
set -g @catppuccin_window_current_text " #W #{?#{==:#{pane_current_command},ssh},#T,#{s|$HOME/src/github.com/lucacome/|git/|;s|$HOME|~|:pane_current_path}}"  # active: ssh shows host, else path
set -g @catppuccin_window_current_number_color "#{E:@thm_peach}"  # active window number colour
set -g @catppuccin_window_flags "icon"                     # show nerd font icons for zoom/activity state
set -g @catppuccin_status_connect_separator "no"
set -g @catppuccin_status_module_bg_color "#{E:@thm_mantle}" # status module text background colour

run '~/.tmux/plugins/tpm/tpm'

# Status line — set after tpm so @catppuccin_status_* variables are defined
set -g status-left "#{E:@catppuccin_status_session}"
set -g status-right "#{E:@catppuccin_status_directory}"
set -g status-left-length 100
set -g status-right-length 100
